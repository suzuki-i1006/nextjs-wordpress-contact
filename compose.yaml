services:
  app:
    build:
      context: .
    tty: true
    volumes:
      - ./src:/app
      - node_modules:/app/node_modules
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    command: sh -c "npm ci --no-audit --no-fund && npm run dev -- --webpack"
    ports:
      - "3000:3000"

volumes:
  node_modules:
